name: Update Fuel Data

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate fuel data
        run: node scripts/process-data.mjs

      - name: Generate fuel data (Spain & Portugal)
        run: node scripts/process-data-iberia.mjs

      - name: Generate price history (national + per-station)
        run: node scripts/generate-history.mjs --bootstrap

      # Spain/Portugal have no yearly archive, so their national averages are
      # accumulated one point per day and committed back (see the script).
      - name: Append per-country daily averages
        run: node scripts/generate-history-countries.mjs

      - name: Commit brands cache and country history if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add brands-cache.json public/data/history-countries.json
          if git diff --staged --quiet; then
            echo "No brand or history changes"
          else
            git commit -m "chore: update brands cache & country history $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Build
        run: npm run build
        env:
          # Same opt-in MapTiler injection as deploy.yml — keeps cron and
          # push-deploy in sync so the FR-tile path is identical whether
          # the deploy was triggered by main push or the 2h cron. When
          # the secret is absent (current state), BaseTileLayer falls
          # back to CARTO automatically — no error.
          VITE_MAPTILER_KEY: ${{ secrets.MAPTILER_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
