name: Android

# Two jobs:
#  - check   : compiles a debug build + runs unit tests on every push/PR that
#              touches the Android app. No secrets required. Guards against
#              broken Android code landing on main.
#  - release : builds a SIGNED release .aab, uploaded as an artifact. Runs only
#              on manual dispatch or a version tag, and only if the signing
#              secrets are configured (see below). Skips signing gracefully
#              otherwise (Gradle falls back to debug signing).
#
# Required repository secrets for a signed release build
# (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64   base64 of apps/android/fuelradar-release.jks
#                             ( base64 -i fuelradar-release.jks | pbcopy )
#   ANDROID_KEYSTORE_PASSWORD store password
#   ANDROID_KEY_ALIAS         key alias (fuelradar)
#   ANDROID_KEY_PASSWORD      key password
#   MAPS_API_KEY              production Google Maps key

on:
  push:
    branches: [main]
    paths: ["apps/android/**", ".github/workflows/android.yml"]
    tags: ["android-v*"]
  pull_request:
    paths: ["apps/android/**", ".github/workflows/android.yml"]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/android

jobs:
  check:
    name: Compile & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug + run unit tests
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --stacktrace

  release:
    name: Signed release bundle
    # Only build the release bundle for a manual run or a version tag — not on
    # every PR. Requires the signing secrets to be present.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/android-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore + write keystore.properties
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No signing secrets — release will be debug-signed."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 --decode > fuelradar-release.jks
          {
            echo "storeFile=fuelradar-release.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Build release bundle
        env:
          # build.gradle.kts reads MAPS_API_KEY from env when local.properties is absent.
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: fuelradar-release-aab
          path: apps/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Clean up signing material
        if: always()
        run: rm -f fuelradar-release.jks keystore.properties
